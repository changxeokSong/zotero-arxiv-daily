zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null
  ignore_path: null

source:
  arxiv:
    category: ["cs.AI", "cs.CV", "cs.LG", "cs.CL"]
    include_cross_list: true
  biorxiv:
    category: null
  medrxiv:
    category: null

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.naver.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}   
    base_url: ${oc.env:OPENAI_API_BASE} 
  generation_kwargs:
    max_tokens: 1024
    model: llama-3.1-8b-instant # 🎯 플레이그라운드에서 확인하신 모델 반영
  language: Korean

reranker:
  local:
    model: jinaai/jina-embeddings-v5-text-nano
    encode_kwargs:
      task: retrieval
      prompt_name: document
  api:
    key: null       # 🛠️ 구조를 지우지 않고 null로 남겨두어 테스트 에러를 방지합니다.
    base_url: null
    model: null
    batch_size: null

executor:
  debug: false     # 🤫 로그를 깨끗하게 만들기 위해 false 고정
  send_empty: false
  max_paper_num: 8  # ⚠️ 6000 토큰 제한을 넘지 않게 논문 수 최적화
  source: ['arxiv']
  reranker: local   # 🔑 HF_TOKEN 인증을 통해 로컬로 매끄럽게 처리
